apiVersion: v1
kind: Service
metadata:
  name: trip-service
  labels:
    app: trip-service
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8101"
    prometheus.io/path: "/metrics"
spec:
  selector:
    app: trip-service
  ports:
    - port: 8101
      targetPort: 8101
      protocol: TCP
  type: ClusterIP
