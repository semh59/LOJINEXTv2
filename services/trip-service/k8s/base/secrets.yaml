apiVersion: v1
kind: Secret
metadata:
  name: trip-service-secrets
type: Opaque
stringData:
  DATABASE_URL: "REPLACE_IN_GITOPS"
  REDIS_URL: "REPLACE_IN_GITOPS"
  BROKER_URL: "REPLACE_IN_GITOPS"
---
# K8s Secrets are base64-encoded NOT encrypted.
# Production: use ExternalSecrets + HashiCorp Vault or Sealed Secrets.
apiVersion: v1
kind: Secret
metadata:
  name: trip-service-tls
type: kubernetes.io/tls
data:
  tls.crt: "REPLACE_WITH_VAULT_INJECTED"
  tls.key: "REPLACE_WITH_VAULT_INJECTED"