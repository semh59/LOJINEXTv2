name: Trip Service CI

on:
  push:
    branches: [main, develop]
    paths:
      - "services/trip-service/**"
      - "packages/**"
  pull_request:
    branches: [main]
    paths:
      - "services/trip-service/**"
      - "packages/**"

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r services/trip-service/requirements-dev.txt 2>/dev/null || true
          pip install -e packages/platform-auth
          pip install -e packages/platform-common
          pip install -e services/trip-service

      - name: Lint (ruff)
        run: ruff check services/trip-service/src/

      - name: Type check (mypy)
        run: mypy services/trip-service/src/ --ignore-missing-imports || true

      - name: Unit tests
        run: pytest services/trip-service/tests/unit -v --tb=short

      - name: Integration tests
        run: pytest services/trip-service/tests/integration -v --tb=short || true

  build-and-push:
    needs: lint-and-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/trip-service/Dockerfile
          push: true
          tags: |
            ${{ secrets.REGISTRY_URL }}/trip-service:${{ github.sha }}
            ${{ secrets.REGISTRY_URL }}/trip-service:latest

  security-scan:
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ secrets.REGISTRY_URL }}/trip-service:${{ github.sha }}"
          severity: "CRITICAL,HIGH"
          exit-code: "1"