apiVersion: apps/v1
kind: Deployment
metadata:
  name: fleet-service
  labels:
    app: fleet-service
    part-of: lojinext-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fleet-service
  template:
    metadata:
      labels:
        app: fleet-service
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      terminationGracePeriodSeconds: 60
      containers:
        - name: api
          image: lojinext/fleet-service:latest
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: [ALL] }
          ports: [{ containerPort: 8102 }]
          envFrom:
            - configMapRef: { name: fleet-service-config }
            - secretRef: { name: fleet-service-secrets }
          readinessProbe:
            httpGet: { path: /ready, port: 8102 }
          resources:
            requests: { cpu: 500m, memory: 512Mi }
            limits: { cpu: 500m, memory: 512Mi }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: fleet-service-isolation
spec:
  podSelector:
    matchLabels: { app: fleet-service }
  policyTypes: [Ingress, Egress]
  ingress:
    - from:
        - podSelector: { matchLabels: { app: nginx-gateway } }
        - podSelector: { matchLabels: { part-of: lojinext-platform } }
      ports: [{ protocol: TCP, port: 8102 }]
  egress:
    - to:
        - podSelector: { matchLabels: { app: redis } }
        - podSelector: { matchLabels: { app: kafka } }
        - podSelector: { matchLabels: { app: postgres } }
    - to:
        [{ ports: [{ protocol: UDP, port: 53 }, { protocol: TCP, port: 53 }] }]
