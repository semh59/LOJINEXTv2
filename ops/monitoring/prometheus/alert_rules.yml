# LOJINEXTv2 Standardized Alerting Rules

groups:
  - name: lojinext_outbox_alerts
    rules:
      - alert: OutboxHighLag
        expr: outbox_pending_count > 1000
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High outbox lag on {{ $labels.service }}"
          description: "Outbox table has more than 1000 pending events for 5 minutes. Potential worker stall."

      - alert: OutboxPublishFailures
        expr: rate(outbox_publish_errors_total[2m]) > 0.05
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Outbox publish failure rate high"
          description: "Outbox relay for {{ $labels.service }} is failing to publish to Kafka."

  - name: lojinext_service_health
    rules:
      - alert: MicroserviceDown
        expr: up == 0
        for: 1min
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.job }} is down"
          description: "Instance {{ $labels.instance }} has been unreachable for more than 1 minute."

      - alert: HighMemoryUsage
        expr: (process_resident_memory_bytes / process_virtual_memory_bytes) > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High Memory Usage for {{ $labels.service }}"
          description: "Memory utilization is above 80%."

  - name: lojinext_resilience_alerts
    rules:
      - alert: CircuitBreakerOpen
        expr: circuit_breaker_state{state="open"} == 1
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Circuit Breaker OPEN in {{ $labels.service }}"
          description: "Circuit breaker for {{ $labels.target_service }} is in OPEN state, failing fast."

  - name: lojinext_api_performance
    rules:
      - alert: HighErrorRate
        expr: rate(http_requests_total{status_code=~"5.."}[5m]) / rate(http_requests_total[5m]) > 0.05
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "High HTTP 5xx error rate on {{ $labels.service }}"
          description: "Error rate is {{ $value | humanizePercentage }} over the last 5 minutes."

      - alert: HighLatencyP99
        expr: histogram_quantile(0.99, sum by (service, endpoint, le) (rate(http_request_duration_seconds_bucket[5m]))) > 5.0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Critical P99 Latency Spike: {{ $labels.service }} -> {{ $labels.endpoint }}"
          description: "P99 latency reached {{ $value | humanizeDuration }}."
