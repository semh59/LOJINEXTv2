global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alert_rules.yml"

scrape_configs:
  - job_name: "lojinext_backend"
    static_configs:
      - targets: ["backend:8000"]
    metrics_path: "/metrics"

  - job_name: "celery_exporter"
    static_configs:
      - targets: ["celery-exporter:9808"]

  - job_name: "redis_exporter"
    static_configs:
      - targets: ["redis-exporter:9121"]

  - job_name: "trip_service"
    static_configs:
      - targets: ["trip-service:8101"]
    metrics_path: "/metrics"
