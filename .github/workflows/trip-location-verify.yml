name: "Multi-Service Verify"

on:
  push:
    branches: [dev]
    paths:
      - "services/trip-service/**"
      - "services/location-service/**"
      - "services/driver-service/**"
      - "services/fleet-service/**"
      - "services/identity-service/**"
      - "packages/platform-auth/**"
      - "deploy/compose/trip-location/**"
      - "ops/trip_location/**"
  pull_request:
    branches: [dev, main]
    paths:
      - "services/trip-service/**"
      - "services/location-service/**"
      - "services/driver-service/**"
      - "services/fleet-service/**"
      - "services/identity-service/**"
      - "packages/platform-auth/**"
      - "deploy/compose/trip-location/**"
      - "ops/trip_location/**"

jobs:
  platform-auth:
    name: "Platform Auth - Tests"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/platform-auth
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run tests
        run: pytest tests/ -v --tb=short

  trip-service:
    name: "Trip Service - Lint + Type-Check + Tests"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/trip-service
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: trip_service_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    env:
      TRIP_DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/trip_service_test
      TRIP_ENVIRONMENT: test
      TRIP_AUTH_JWT_ALGORITHM: RS256
      TRIP_AUTH_ISSUER: lojinext-platform
      TRIP_AUTH_AUDIENCE: lojinext-platform
      TRIP_AUTH_JWKS_URL: https://identity.test/.well-known/jwks.json
      TRIP_AUTH_SERVICE_TOKEN_URL: http://identity-api:8105/auth/v1/token/service
      TRIP_AUTH_SERVICE_CLIENT_ID: trip-service
      TRIP_AUTH_SERVICE_CLIENT_SECRET: trip-client-secret
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ../../packages/platform-auth
          pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check src/ tests/
      - name: Type check (mypy)
        run: mypy src/trip_service/ --ignore-missing-imports
      - name: Run migrations
        run: alembic upgrade head
      - name: Run tests
        run: pytest tests/ -v --tb=short

  location-service:
    name: "Location Service - Lint + Type-Check + Tests"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/location-service
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: location_service_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    env:
      LOCATION_DATABASE_URL: postgresql+asyncpg://test:test@localhost:5433/location_service_test
      LOCATION_ENVIRONMENT: test
      LOCATION_AUTH_JWT_ALGORITHM: RS256
      LOCATION_AUTH_ISSUER: lojinext-platform
      LOCATION_AUTH_AUDIENCE: lojinext-platform
      LOCATION_AUTH_JWKS_URL: https://identity.test/.well-known/jwks.json
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ../../packages/platform-auth
          pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check src/ tests/
      - name: Type check (mypy)
        run: mypy src/location_service/ --ignore-missing-imports
      - name: Run migrations
        run: alembic upgrade head
      - name: Run tests
        run: pytest tests/ -v --tb=short

  driver-service:
    name: "Driver Service - Lint + Type-Check + Tests"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/driver-service
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: driver_service_test
        ports:
          - 5434:5432
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    env:
      DRIVER_DATABASE_URL: postgresql+asyncpg://test:test@localhost:5434/driver_service_test
      DRIVER_ENVIRONMENT: test
      DRIVER_AUTH_JWT_ALGORITHM: RS256
      DRIVER_AUTH_ISSUER: lojinext-platform
      DRIVER_AUTH_AUDIENCE: lojinext-platform
      DRIVER_AUTH_JWKS_URL: https://identity.test/.well-known/jwks.json
      DRIVER_AUTH_SERVICE_TOKEN_URL: http://identity-api:8105/auth/v1/token/service
      DRIVER_AUTH_SERVICE_CLIENT_ID: driver-service
      DRIVER_AUTH_SERVICE_CLIENT_SECRET: driver-client-secret
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ../../packages/platform-auth
          pip install -e ".[dev]"
      - name: Lint (ruff)
