  fleet-service:
    name: "Fleet Service - Lint + Type-Check + Tests"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/fleet-service
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: fleet_service_test
        ports:
          - 5435:5432
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    env:
      FLEET_DATABASE_URL: postgresql+asyncpg://test:test@localhost:5435/fleet_service_test
      FLEET_ENVIRONMENT: test
      FLEET_AUTH_JWT_ALGORITHM: RS256
      FLEET_AUTH_ISSUER: lojinext-platform
      FLEET_AUTH_AUDIENCE: lojinext-platform
      FLEET_AUTH_JWKS_URL: https://identity.test/.well-known/jwks.json
      FLEET_AUTH_SERVICE_TOKEN_URL: http://identity-api:8105/auth/v1/token/service
      FLEET_AUTH_SERVICE_CLIENT_ID: fleet-service
      FLEET_AUTH_SERVICE_CLIENT_SECRET: fleet-client-secret
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
