      - name: Run migrations
        run: alembic upgrade head
      - name: Run tests
        run: pytest tests/ -v --tb=short

  identity-service:
    name: "Identity Service - Lint + Type-Check + Tests"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/identity-service
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: identity_service_test
        ports:
          - 5436:5432
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    env:
      IDENTITY_DATABASE_URL: postgresql+asyncpg://test:test@localhost:5436/identity_service_test
      IDENTITY_ENVIRONMENT: test
      IDENTITY_BOOTSTRAP_SUPERADMIN_PASSWORD: bootstrap-password
      IDENTITY_TEST_BACKEND: postgres
      IDENTITY_SERVICE_CLIENTS: trip-service,location-service,driver-service,fleet-service
      IDENTITY_SERVICE_CLIENT_SECRET__TRIP_SERVICE: trip-client-secret
      IDENTITY_SERVICE_CLIENT_SECRET__LOCATION_SERVICE: location-client-secret
      IDENTITY_SERVICE_CLIENT_SECRET__DRIVER_SERVICE: driver-client-secret
      IDENTITY_SERVICE_CLIENT_SECRET__FLEET_SERVICE: fleet-client-secret
      IDENTITY_KEY_ENCRYPTION_KEY_B64: MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=
      IDENTITY_KEY_ENCRYPTION_KEY_VERSION: ci-v1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ../../packages/platform-auth
          pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check src tests
      - name: Syntax check (compileall)
        run: python -m compileall src
      - name: Run migrations
        run: alembic upgrade head
      - name: Run tests
        run: pytest tests/ -v --tb=short

  stack-smoke:
    name: "Five Service Stack Smoke"
    runs-on: ubuntu-latest
    needs:
      - trip-service
      - location-service
      - driver-service
      - fleet-service
      - identity-service
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - name: Create CI env
        working-directory: deploy/compose/trip-location
        run: |
          cat > .env <<'EOF'
          POSTGRES_USER=lojinext
          POSTGRES_PASSWORD=lojinext-ci-password
          AUTH_ISSUER=lojinext-platform
          AUTH_AUDIENCE=lojinext-platform
          IDENTITY_KEY_ENCRYPTION_KEY_B64=MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=
          IDENTITY_KEY_ENCRYPTION_KEY_VERSION=ci-v1
          IDENTITY_BOOTSTRAP_SUPERADMIN_USERNAME=superadmin
          IDENTITY_BOOTSTRAP_SUPERADMIN_EMAIL=superadmin@example.com
          IDENTITY_BOOTSTRAP_SUPERADMIN_PASSWORD=bootstrap-password
          TRIP_SERVICE_CLIENT_SECRET=trip-client-secret
          LOCATION_SERVICE_CLIENT_SECRET=location-client-secret
          DRIVER_SERVICE_CLIENT_SECRET=driver-client-secret
          FLEET_SERVICE_CLIENT_SECRET=fleet-client-secret
          TRIP_ALLOW_PLAINTEXT_IN_PROD=true
          LOCATION_MAPBOX_API_KEY=mock_key
          LOCATION_ORS_API_KEY=mock_key
          LOCATION_ENABLE_ORS_VALIDATION=true
          DRIVER_ALLOW_PLAINTEXT_IN_PROD=true
          FLEET_ALLOW_PLAINTEXT_IN_PROD=true
          EOF
      - name: Build and start stack
        working-directory: deploy/compose/trip-location
        run: docker compose -f docker-compose.prod.yml -f docker-compose.ci.yml up -d --build
      - name: Run migrations
        working-directory: deploy/compose/trip-location
        run: |
          docker compose -f docker-compose.prod.yml -f docker-compose.ci.yml exec -T identity-api alembic upgrade head
          docker compose -f docker-compose.prod.yml -f docker-compose.ci.yml exec -T trip-api alembic upgrade head
          docker compose -f docker-compose.prod.yml -f docker-compose.ci.yml exec -T location-api alembic upgrade head
          docker compose -f docker-compose.prod.yml -f docker-compose.ci.yml exec -T driver-api alembic upgrade head
          docker compose -f docker-compose.prod.yml -f docker-compose.ci.yml exec -T fleet-api alembic upgrade head
      - name: Wait for readiness
        run: |
          wait_ready() {
            local name="$1"
            local url="$2"
            for i in $(seq 1 24); do
              code=$(curl -s -o /dev/null -w '%{http_code}' "$url" || true)
              if [ "$code" = "200" ]; then
                echo "$name ready after $((i * 5))s"
                return 0
              fi
              sleep 5
            done
            echo "::error::$name readiness did not converge"
            return 1
          }

          wait_ready identity http://localhost:8105/ready || exit 1

          wait_ready trip http://localhost:8101/ready &
          trip_pid=$!
          wait_ready location http://localhost:8103/ready &
          loc_pid=$!
          wait_ready driver http://localhost:8104/ready &
          dr_pid=$!
          wait_ready fleet http://localhost:8102/ready &
          fl_pid=$!

          for pid in $trip_pid $loc_pid $dr_pid $fl_pid; do
            wait $pid || exit 1
          done
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run smoke
        env:
          IDENTITY_BOOTSTRAP_SUPERADMIN_PASSWORD: bootstrap-password
          TRIP_SERVICE_CLIENT_SECRET: trip-client-secret
          LOCATION_SERVICE_CLIENT_SECRET: location-client-secret
          DRIVER_SERVICE_CLIENT_SECRET: driver-client-secret
          FLEET_SERVICE_CLIENT_SECRET: fleet-client-secret
          AUTH_AUDIENCE: lojinext-platform
        run: python ops/trip_location/smoke_stack.py --identity-url http://localhost:8105
      - name: Collect logs on failure
        if: failure()
        working-directory: deploy/compose/trip-location
        run: docker compose -f docker-compose.prod.yml -f docker-compose.ci.yml logs --tail=200
      - name: Tear down
        if: always()
        working-directory: deploy/compose/trip-location
        run: docker compose -f docker-compose.prod.yml -f docker-compose.ci.yml down -v --remove-orphans
