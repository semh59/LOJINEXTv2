name: "Driver Service - Verify"

on:
  push:
    branches: [dev, main]
    paths:
      - "services/driver-service/**"
      - "packages/platform-auth/**"
  pull_request:
    branches: [dev, main]
    paths:
      - "services/driver-service/**"
      - "packages/platform-auth/**"

jobs:
  verify:
    name: "Lint + Type-Check + Tests"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/driver-service
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    env:
      DRIVER_DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test
      DRIVER_ENVIRONMENT: test
      DRIVER_AUTH_JWT_ALGORITHM: RS256
      DRIVER_AUTH_ISSUER: lojinext-platform
      DRIVER_AUTH_AUDIENCE: lojinext-platform
      DRIVER_AUTH_JWKS_URL: https://identity.test/.well-known/jwks.json
      DRIVER_AUTH_SERVICE_TOKEN_URL: http://identity-api:8105/auth/v1/token/service
      DRIVER_AUTH_SERVICE_CLIENT_ID: driver-service
      DRIVER_AUTH_SERVICE_CLIENT_SECRET: driver-client-secret
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ../../packages/platform-auth
          pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check src/ tests/
      - name: Type check (mypy)
        run: mypy src/driver_service/ --ignore-missing-imports
      - name: Run tests
        run: pytest tests/ -v --tb=short
