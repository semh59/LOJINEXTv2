services:
  identity-api:
    profiles: ["default"]

  trip-api:
    environment:
      TRIP_ENVIRONMENT: prod
      TRIP_ALLOW_PLAINTEXT_IN_PROD: "true"
    profiles: ["default"]

  trip-enrichment:
    profiles: ["default"]

  trip-outbox:
    profiles: ["default"]

  trip-cleanup:
    profiles: ["default"]

  provider-mock:
    image: nginx:alpine
    profiles: ["default"]
    volumes:
      - ./nginx-mock.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - backend

  location-api:
    environment:
      LOCATION_MAPBOX_API_KEY: mock_key
      LOCATION_MAPBOX_DIRECTIONS_BASE_URL: http://provider-mock/mapbox/driving
      LOCATION_ORS_API_KEY: mock_key
      LOCATION_ORS_BASE_URL: http://provider-mock/v2/directions/driving-car
    profiles: ["default"]

  location-processing:
    profiles: ["default"]

  driver-api:
    profiles: ["default"]

  driver-worker:
    profiles: ["default"]

  fleet-api:
    profiles: ["default"]

  fleet-worker:
    profiles: ["default"]

  nginx:
    profiles: ["default"]

  prometheus:
    profiles: ["monitoring"]

  grafana:
    profiles: ["monitoring"]

  smoke:
    build:
      context: ../../../
      dockerfile: ops/trip_location/Dockerfile.smoke
    environment:
      IDENTITY_API_URL: http://identity-api:8105
      TRIP_API_URL: http://trip-api:8101
      LOCATION_API_URL: http://location-api:8103
      DRIVER_API_URL: http://driver-api:8104
      FLEET_API_URL: http://fleet-api:8102
    depends_on:
      identity-api:
        condition: service_healthy
      trip-api:
        condition: service_healthy
      location-api:
        condition: service_healthy
      driver-api:
        condition: service_healthy
      fleet-api:
        condition: service_healthy
    profiles: ["smoke"]
    networks:
      - backend
