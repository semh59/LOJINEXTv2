# =============================================================================
# CI overlay — strips monitoring, uses ephemeral volumes, adds test profile
# =============================================================================
# Usage:
#   docker compose -f docker-compose.prod.yml -f docker-compose.ci.yml up -d
#   docker compose -f docker-compose.prod.yml -f docker-compose.ci.yml \
#       run --rm smoke python /app/smoke_stack.py
#   docker compose -f docker-compose.prod.yml -f docker-compose.ci.yml down -v

services:
  # Override Trip services to use test environment
  trip-api:
    environment:
      TRIP_ENVIRONMENT: prod
      TRIP_ALLOW_PLAINTEXT_IN_PROD: "true"
    profiles: ["default"]

  trip-enrichment:
    profiles: ["default"]

  trip-outbox:
    profiles: ["default"]

  trip-cleanup:
    profiles: ["default"]

  # Mock fleet service to satisfy Trip API readiness probes
  fleet-api:
    image: nginx:alpine
    profiles: ["default"]
    volumes:
      - ./nginx-mock.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - backend

  # Override Location services to use test environment
  location-api:
    environment:
      LOCATION_MAPBOX_API_KEY: mock_key
      LOCATION_MAPBOX_DIRECTIONS_BASE_URL: http://fleet-api:8102/mapbox/driving
      LOCATION_ORS_API_KEY: mock_key
      LOCATION_ORS_BASE_URL: http://fleet-api:8102/v2/directions/driving-car
    profiles: ["default"]

  location-processing:
    profiles: ["default"]

  # Strip monitoring from CI
  nginx:
    profiles: ["default"]

  prometheus:
    profiles: ["monitoring"]

  grafana:
    profiles: ["monitoring"]

  # Smoke test runner
  smoke:
    build:
      context: ../../../
      dockerfile: ops/trip_location/Dockerfile.smoke
    environment:
      TRIP_API_URL: http://trip-api:8101
      LOCATION_API_URL: http://location-api:8103
    depends_on:
      trip-api:
        condition: service_healthy
      location-api:
        condition: service_healthy
    profiles: ["smoke"]
    networks:
      - backend
