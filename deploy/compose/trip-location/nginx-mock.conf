server {
    listen 8102;
    
    # Fleet Mock - Liveness
    location /health {
        default_type application/json;
        return 200 '{"status":"ok"}';
    }

    # Fleet Mock - Readiness Contract
    location /internal/v1/trip-references/validate {
        default_type application/json;
        return 200 '{"driver_valid":true,"vehicle_valid":true,"trailer_valid":true}';
    }

    # Mapbox Mock
    location /mapbox/driving/ {
        default_type application/json;
        return 200 '{"routes":[{"distance":1.0,"duration":1.0,"geometry":{"type":"LineString","coordinates":[]},"legs":[{"annotation":{}}]}]}';
    }

    # ORS Mock
    location /v2/directions/driving-car {
        default_type application/json;
        return 200 '{"routes":[{"summary":{"distance":1.0,"duration":1.0}}]}';
    }
}
