# =============================================================================
# Trip + Location Service — Production Compose Stack
# =============================================================================
# Usage:
#   cp .env.example .env   # then fill in real secrets
#   docker compose -f docker-compose.prod.yml up -d
#
# Split topology:
#   trip-api              → HTTP API (port 8101)
#   trip-enrichment       → Enrichment claim worker
#   trip-outbox           → Outbox relay worker
#   trip-cleanup          → Idempotency/outbox cleanup worker
#   location-api          → HTTP API (port 8103)
#   location-processing   → Durable processing worker
# =============================================================================

name: lojinextv2

x-trip-common: &trip-common
  build:
    context: ../../../services/trip-service
    dockerfile: Dockerfile
  env_file: .env
  environment:
    TRIP_ENVIRONMENT: prod
    TRIP_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-lojinext}:${POSTGRES_PASSWORD}@postgres:5432/${TRIP_DB_NAME:-trip_service}
    TRIP_KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
    TRIP_LOCATION_SERVICE_URL: http://location-api:8103
    TRIP_FLEET_SERVICE_URL: http://fleet-api:8102
    TRIP_ALLOW_PLAINTEXT_IN_PROD: ${TRIP_ALLOW_PLAINTEXT_IN_PROD:-true}
  depends_on:
    postgres:
      condition: service_healthy
    redpanda:
      condition: service_healthy
  restart: unless-stopped
  networks:
    - backend

x-location-common: &location-common
  build:
    context: ../../../services/location-service
    dockerfile: Dockerfile
  env_file: .env
  environment:
    LOCATION_ENVIRONMENT: prod
    LOCATION_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-lojinext}:${POSTGRES_PASSWORD}@postgres:5432/${LOCATION_DB_NAME:-location_service}
  depends_on:
    postgres:
      condition: service_healthy
  restart: unless-stopped
  networks:
    - backend

services:
  # ---------------------------------------------------------------------------
  # Infrastructure
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lojinext}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${TRIP_DB_NAME:-trip_service}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lojinext}"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - backend

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.1.7
    command:
      - redpanda start
      - --smp 1
      - --memory 256M
      - --overprovisioned
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
      - --mode dev-container
    ports:
      - "${REDPANDA_EXTERNAL_PORT:-19092}:19092"
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    healthcheck:
      test:
        ["CMD-SHELL", "curl -f http://localhost:9644/v1/status/ready || exit 1"]
      interval: 5s
      timeout: 10s
      retries: 20
    restart: unless-stopped
    networks:
      - backend

  # ---------------------------------------------------------------------------
  # Trip Service — Split Topology
  # ---------------------------------------------------------------------------
  trip-api:
    <<: *trip-common
    command: ["trip-api"]
    ports:
      - "${TRIP_API_PORT:-8101}:8101"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://localhost:8101/ready'')"',
        ]
      interval: 10s
      timeout: 5s
      retries: 3

  trip-enrichment:
    <<: *trip-common
    command: ["trip-enrichment-worker"]

  trip-outbox:
    <<: *trip-common
    command: ["trip-outbox-worker"]

  trip-cleanup:
    <<: *trip-common
    command: ["trip-cleanup-worker"]

  # ---------------------------------------------------------------------------
  # Location Service — Split Topology
  # ---------------------------------------------------------------------------
  location-api:
    <<: *location-common
    command: ["location-api"]
    ports:
      - "${LOCATION_API_PORT:-8103}:8103"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://localhost:8103/ready'')"',
        ]
      interval: 10s
      timeout: 5s
      retries: 3

  location-processing:
    <<: *location-common
    command: ["location-processing-worker"]

  # ---------------------------------------------------------------------------
  # Driver Service — Multi-process
  # ---------------------------------------------------------------------------
  driver-api:
    build:
      context: ../../../services/driver-service
      dockerfile: Dockerfile
    command: ["driver-api"]
    env_file: .env
    environment:
      DRIVER_ENVIRONMENT: prod
      DRIVER_BROKER_TYPE: kafka
      DRIVER_AUTH_JWT_SECRET: ${DRIVER_AUTH_JWT_SECRET:-driver-production-secret-override-in-env}
      DRIVER_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-lojinext}:${POSTGRES_PASSWORD}@postgres:5432/${DRIVER_DB_NAME:-driver_service}
      DRIVER_KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      DRIVER_ALLOW_PLAINTEXT_IN_PROD: ${DRIVER_ALLOW_PLAINTEXT_IN_PROD:-true}
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    ports:
      - "${DRIVER_API_PORT:-8104}:8104"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://localhost:8104/ready'')"',
        ]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - backend

  driver-worker:
    build:
      context: ../../../services/driver-service
      dockerfile: Dockerfile
    command: ["driver-worker"]
    env_file: .env
    environment:
      DRIVER_ENVIRONMENT: prod
      DRIVER_BROKER_TYPE: kafka
      DRIVER_AUTH_JWT_SECRET: ${DRIVER_AUTH_JWT_SECRET:-driver-production-secret-override-in-env}
      DRIVER_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-lojinext}:${POSTGRES_PASSWORD}@postgres:5432/${DRIVER_DB_NAME:-driver_service}
      DRIVER_KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      DRIVER_ALLOW_PLAINTEXT_IN_PROD: ${DRIVER_ALLOW_PLAINTEXT_IN_PROD:-true}
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - backend

  # ---------------------------------------------------------------------------
  # Reverse Proxy
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx/nginx.conf.template:/etc/nginx/templates/default.conf.template:ro
    environment:
      TRIP_API_UPSTREAM: trip-api:8101
      LOCATION_API_UPSTREAM: location-api:8103
    ports:
      - "${NGINX_PORT:-80}:80"
    depends_on:
      trip-api:
        condition: service_healthy
      location-api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - backend

  # ---------------------------------------------------------------------------
  # Monitoring
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.53.0
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    restart: unless-stopped
    networks:
      - backend

  grafana:
    image: grafana/grafana-oss:11.1.0
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - backend

volumes:
  pg_data:
  redpanda_data:
  prometheus_data:
  grafana_data:

networks:
  backend:
    driver: bridge
